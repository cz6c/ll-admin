# workflow 工作流的名字，自定义
name: deploy web

# 配置触发条件
on:
  push: # 监听到 web 分支的 push 动作
    branches:
      - web

# 工作流的任务集配置
jobs:
  # 定义一个 job，id 为 deploy
  deploy:
    # 指定任务执行的运行器。
    runs-on: ubuntu-latest

    # 定义 job 的具体步骤
    steps:
      # 官方 action
      - name: Checkout
        uses: actions/checkout@v5

      # 不写 version：由根 package.json 的 packageManager决定，避免与 Action 硬编码冲突
      - name: Install pnpm
        uses: pnpm/action-setup@v6

      - name: Install Node
        uses: actions/setup-node@v5
        with:
          node-version: "22.18.0"
          cache: "pnpm"

      # common 的 main/module 指向 dist（已 gitignore），必须先 build 再编 admin
      # --filter @apps/admin...：只装 admin 及其依赖（含 workspace @llcz/common）
      # --config.shamefully-hoist：对齐 apps/admin/.npmrc；从仓库根 install 不会读子包 .npmrc
      - name: Install And build
        run: |
          pnpm install --filter @apps/admin... --config.shamefully-hoist=true
          pnpm --filter @llcz/common build
          pnpm --filter @apps/admin run bs:build

      # 拷贝文件到服务器指定目录
      - name: Deploy to server
        uses: easingthemes/ssh-deploy@main
        env:
          # 私钥
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          # SCP参数；排除宝塔 .user.ini，避免 --delete 因无权 unlink 导致 rsync 23
          ARGS: "-avzr --delete --exclude=.user.ini"
          # 源目录
          SOURCE: "apps/admin/dist/"
          # 服务器ip
          REMOTE_HOST: ${{ secrets.SERVER_HOST }}
          # 用户
          REMOTE_USER: ${{ secrets.SERVER_USER }}
          # 目标地址
          TARGET: "/www/wwwroot/ll_admin"
